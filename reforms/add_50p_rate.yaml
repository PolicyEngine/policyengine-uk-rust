# Reform: Add 50p additional rate above £250,000
#
# Adds a new 50% tax band for income above £250,000.
# This is a structural reform that replaces the entire bracket structure.
#
# Run with: cargo run --release -- --reform reforms/add_50p_rate.yaml

income_tax:
  uk_brackets:
    - { rate: 0.20, threshold: 0.0 }
    - { rate: 0.40, threshold: 37700.0 }
    - { rate: 0.45, threshold: 125140.0 }
    - { rate: 0.50, threshold: 250000.0 }
