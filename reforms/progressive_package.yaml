# Reform: Progressive Package — fund UC taper cut with higher top rates
#
# Cuts the UC taper from 55% to 40%, massively improving work incentives
# for low earners on Universal Credit. Funded by:
#   - New 50% rate above £150k
#   - New 55% rate above £500k
#   - Scottish top rate raised to 52%
#
# Run with: cargo run --release -- --reform reforms/progressive_package.yaml

income_tax:
  uk_brackets:
    - { rate: 0.18, threshold: 0.0 }
    - { rate: 0.40, threshold: 37700.0 }
    - { rate: 0.45, threshold: 125140.0 }
    - { rate: 0.50, threshold: 150000.0 }
    - { rate: 0.55, threshold: 500000.0 }
  scottish_brackets:
    - { rate: 0.19, threshold: 0.0 }
    - { rate: 0.20, threshold: 2306.0 }
    - { rate: 0.21, threshold: 13991.0 }
    - { rate: 0.42, threshold: 31092.0 }
    - { rate: 0.45, threshold: 62430.0 }
    - { rate: 0.52, threshold: 125140.0 }
