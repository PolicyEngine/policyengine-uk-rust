# UK Tax-Benefit Parameters for Fiscal Year 2028/29
# Projected using OBR March 2026 forecasts.
# Income tax thresholds assumed to resume CPI uprating after freeze ends.

fiscal_year: "2028/29"

income_tax:
  # PA resumes CPI uprating: £12,570 × 1.0195 ≈ £12,815 (rounded)
  personal_allowance: 12815.0
  pa_taper_threshold: 100000.0
  pa_taper_rate: 0.5
  uk_brackets:
    - { rate: 0.20, threshold: 0.0 }
    - { rate: 0.40, threshold: 38435.0 }   # £37,700 × 1.0195
    - { rate: 0.45, threshold: 127580.0 }  # PA × 2 + £100k
  scottish_brackets:
    - { rate: 0.19, threshold: 0.0 }
    - { rate: 0.20, threshold: 2351.0 }
    - { rate: 0.21, threshold: 14264.0 }
    - { rate: 0.42, threshold: 31698.0 }
    - { rate: 0.45, threshold: 63648.0 }
    - { rate: 0.48, threshold: 127580.0 }
  dividend_allowance: 500.0
  dividend_basic_rate: 0.0875
  dividend_higher_rate: 0.3375
  dividend_additional_rate: 0.3935
  savings_starter_rate_band: 5000.0

national_insurance:
  primary_threshold_annual: 12815.0
  upper_earnings_limit_annual: 51250.0
  main_rate: 0.08
  additional_rate: 0.02
  secondary_threshold_annual: 5000.0
  employer_rate: 0.15
  class4_lower_profits_limit: 12815.0
  class4_upper_profits_limit: 51250.0
  class4_main_rate: 0.06
  class4_additional_rate: 0.02

universal_credit:
  # Projected: 2027/28 amounts uprated by ~2.0% CPI
  standard_allowance_single_under25: 341.01
  standard_allowance_single_over25: 430.47
  standard_allowance_couple_under25: 535.32
  standard_allowance_couple_over25: 675.81
  child_element_first: 364.75
  child_element_subsequent: 315.05
  disabled_child_lower: 170.82
  disabled_child_higher: 533.52
  lcwra_element: 455.41
  carer_element: 217.00
  taper_rate: 0.55
  work_allowance_higher: 735.0
  work_allowance_lower: 443.0
  child_limit: 2
  housing_cost_contribution: 100.08

child_benefit:
  eldest_weekly: 28.02
  additional_weekly: 18.56
  hicbc_threshold: 60000.0
  hicbc_taper_end: 80000.0

state_pension:
  # Triple lock: 2.5% > CPI 2.0% > earnings 2.2%, so 2.5% floor used
  new_state_pension_weekly: 254.65  # £248.44 × 1.025
  old_basic_pension_weekly: 195.16

pension_credit:
  standard_minimum_single: 247.15
  standard_minimum_couple: 377.23
  savings_credit_threshold_single: 215.77
  savings_credit_threshold_couple: 342.12

growth_factors:
  # OBR Economic and Fiscal Outlook, March 2026
  cpi_rate: 0.02036        # 2.036% CPI inflation (FY 2028/29)
  gdp_deflator: 0.01865    # 1.865% GDP deflator
  earnings_growth: 0.02121  # 2.121% average weekly earnings growth
