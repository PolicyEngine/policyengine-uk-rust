# UK Tax-Benefit Parameters for Fiscal Year 2026/27
# Projected using OBR March 2026 CPI forecasts applied to 2025/26 base values.
# Income tax thresholds assumed frozen per current government policy.
# Benefits uprated by September 2025 CPI (OBR forecast: ~3.4%).

