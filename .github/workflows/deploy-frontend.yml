name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "interfaces/web/app/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: interfaces/web/app/package-lock.json

      - name: Install dependencies
        working-directory: interfaces/web/app
        run: npm ci

      - name: Build static export
        working-directory: interfaces/web/app
        env:
          NODE_ENV: production
          # Point to the deployed Modal API — set this secret in GitHub repo settings.
          # Format: https://<your-modal-workspace>--policyengine-uk-api.modal.run
          NEXT_PUBLIC_API_URL: ${{ secrets.MODAL_API_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: interfaces/web/app/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
