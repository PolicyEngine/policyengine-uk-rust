<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HICBC Taper Window — Marginal Tax Rates</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fafafa;
  }
  .container {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    padding: 32px 40px;
    max-width: 860px;
    width: 100%;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px 0;
    color: #1a1a2e;
  }
  .subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .legend {
    display: flex;
    gap: 24px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #333;
    cursor: pointer;
    user-select: none;
  }
  .legend-item.dimmed { opacity: 0.3; }
  .legend-swatch {
    width: 24px;
    height: 3px;
    border-radius: 2px;
  }
  .axis text { font-size: 11px; fill: #666; }
  .axis path, .axis line { stroke: #ddd; }
  .grid line { stroke: #eee; }
  .grid path { display: none; }
  .tooltip {
    position: absolute;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    line-height: 1.6;
  }
  .tooltip .income { font-weight: 600; margin-bottom: 4px; }
  .annotation {
    font-size: 11px;
    fill: #999;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Widening the HICBC Taper Window</h1>
  <p class="subtitle">
    Marginal tax rates for a single parent with one child, 2025/26.<br>
    The High Income Child Benefit Charge claws back CB between £60k and the taper end.
    A wider window spreads the same clawback over more income, reducing the marginal rate spike.
  </p>
  <div class="legend" id="legend"></div>
  <div id="chart"></div>
</div>

<script>
const DATA = {"incomes": [40.0, 41.0, 42.0, 43.0, 44.0, 45.0, 46.0, 47.0, 48.0, 49.0, 50.0, 51.0, 52.0, 53.0, 54.0, 55.0, 56.0, 57.0, 58.0, 59.0, 60.0, 61.0, 62.0, 63.0, 64.0, 65.0, 66.0, 67.0, 68.0, 69.0, 70.0, 71.0, 72.0, 73.0, 74.0, 75.0, 76.0, 77.0, 78.0, 79.0, 80.0, 81.0, 82.0, 83.0, 84.0, 85.0, 86.0, 87.0, 88.0, 89.0, 90.0, 91.0, 92.0, 93.0, 94.0, 95.0, 96.0, 97.0, 98.0, 99.0, 100.0, 101.0, 102.0, 103.0, 104.0, 105.0, 106.0, 107.0, 108.0, 109.0, 110.0, 111.0, 112.0, 113.0, 114.0, 115.0, 116.0, 117.0, 118.0, 119.0, 120.0], "Baseline (\u00a360k-\u00a380k)": [28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 48.77, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0], "\u00a360k-\u00a3100k": [28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 45.39, 45.39, 45.39, 45.38, 45.39, 45.39, 45.39, 45.38, 45.39, 45.39, 45.39, 45.39, 45.39, 45.39, 45.39, 45.39, 45.39, 45.38, 45.39, 45.39, 45.39, 45.38, 45.39, 45.39, 45.39, 45.39, 45.39, 45.39, 45.39, 45.39, 45.39, 45.39, 45.39, 45.39, 45.39, 45.38, 45.39, 45.38, 45.39, 45.38, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0, 62.0], "\u00a360k-\u00a3120k": [28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 28.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 42.0, 44.26, 44.25, 44.26, 44.26, 44.25, 44.26, 44.26, 44.25, 44.26, 44.26, 44.25, 44.26, 44.26, 44.25, 44.26, 44.26, 44.25, 44.26, 44.26, 44.25, 44.26, 44.26, 44.25, 44.26, 44.26, 44.25, 44.26, 44.26, 44.25, 44.26, 44.26, 44.25, 44.26, 44.26, 44.25, 44.26, 44.26, 44.25, 44.26, 44.26, 64.25, 64.26, 64.26, 64.25, 64.26, 64.26, 64.25, 64.26, 64.26, 64.25, 64.26, 64.26, 64.25, 64.26, 64.26, 64.25, 64.26, 64.26, 64.25, 64.26, 62.0]};

const series = [
  { key: "Baseline (£60k-£80k)", color: "#e74c3c", dash: "" },
  { key: "£60k-£100k",           color: "#3498db", dash: "6,3" },
  { key: "£60k-£120k",           color: "#2ecc71", dash: "3,3" },
];

const margin = { top: 20, right: 30, bottom: 44, left: 54 };
const width = 780 - margin.left - margin.right;
const height = 400 - margin.top - margin.bottom;

const svg = d3.select("#chart")
  .append("svg")
    .attr("viewBox", `0 0 ${width + margin.left + margin.right} ${height + margin.top + margin.bottom}`)
    .attr("width", "100%")
  .append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

const x = d3.scaleLinear().domain([40, 120]).range([0, width]);
const y = d3.scaleLinear().domain([0, 70]).range([height, 0]);

// Grid
svg.append("g").attr("class", "grid")
  .call(d3.axisLeft(y).ticks(7).tickSize(-width).tickFormat(""));

// Axes
svg.append("g").attr("class", "axis")
  .attr("transform", `translate(0,${height})`)
  .call(d3.axisBottom(x).ticks(9).tickFormat(d => `£${d}k`));

svg.append("g").attr("class", "axis")
  .call(d3.axisLeft(y).ticks(7).tickFormat(d => `${d}%`));

// Axis labels
svg.append("text")
  .attr("x", width / 2).attr("y", height + 38)
  .attr("text-anchor", "middle")
  .style("font-size", "12px").style("fill", "#666")
  .text("Employment Income");

svg.append("text")
  .attr("transform", "rotate(-90)")
  .attr("x", -height / 2).attr("y", -42)
  .attr("text-anchor", "middle")
  .style("font-size", "12px").style("fill", "#666")
  .text("Marginal Tax Rate");

// Reference lines
[{v: 20, label: "Basic rate (20%)"}, {v: 40, label: "Higher rate (40%)"}].forEach(ref => {
  svg.append("line")
    .attr("x1", 0).attr("x2", width)
    .attr("y1", y(ref.v)).attr("y2", y(ref.v))
    .attr("stroke", "#bbb").attr("stroke-dasharray", "4,4").attr("opacity", 0.6);
  svg.append("text").attr("class", "annotation")
    .attr("x", width - 4).attr("y", y(ref.v) - 5)
    .attr("text-anchor", "end")
    .text(ref.label);
});

// HICBC zone shading
svg.append("rect")
  .attr("x", x(60)).attr("y", 0)
  .attr("width", x(80) - x(60)).attr("height", height)
  .attr("fill", "#e74c3c").attr("opacity", 0.04);

svg.append("text").attr("class", "annotation")
  .attr("x", x(70)).attr("y", 14)
  .attr("text-anchor", "middle")
  .style("fill", "#c0392b")
  .text("Baseline HICBC zone");

// Lines
const line = d3.line()
  .x((d, i) => x(DATA.incomes[i]))
  .y(d => y(d))
  .curve(d3.curveMonotoneX);

const visible = new Set(series.map(s => s.key));

const paths = {};
series.forEach(s => {
  paths[s.key] = svg.append("path")
    .datum(DATA[s.key])
    .attr("fill", "none")
    .attr("stroke", s.color)
    .attr("stroke-width", 2.5)
    .attr("stroke-dasharray", s.dash)
    .attr("d", line);
});

// Legend
const legend = d3.select("#legend");
series.forEach(s => {
  const item = legend.append("div").attr("class", "legend-item")
    .on("click", () => {
      if (visible.has(s.key)) {
        visible.delete(s.key);
        paths[s.key].attr("opacity", 0.08);
        item.classed("dimmed", true);
      } else {
        visible.add(s.key);
        paths[s.key].attr("opacity", 1);
        item.classed("dimmed", false);
      }
    });
  item.append("div").attr("class", "legend-swatch")
    .style("background", s.color);
  item.append("span").text(s.key);
});

// Tooltip
const tooltip = d3.select("body").append("div").attr("class", "tooltip").style("display", "none");
const hoverLine = svg.append("line")
  .attr("y1", 0).attr("y2", height)
  .attr("stroke", "#999").attr("stroke-width", 1).attr("stroke-dasharray", "3,3")
  .style("display", "none");

const dots = {};
series.forEach(s => {
  dots[s.key] = svg.append("circle")
    .attr("r", 4).attr("fill", s.color).attr("stroke", "white").attr("stroke-width", 1.5)
    .style("display", "none");
});

svg.append("rect")
  .attr("width", width).attr("height", height)
  .attr("fill", "transparent")
  .on("mousemove", function(event) {
    const [mx] = d3.pointer(event);
    const income = x.invert(mx);
    const idx = d3.bisect(DATA.incomes, income) - 1;
    if (idx < 0 || idx >= DATA.incomes.length) return;

    const xi = x(DATA.incomes[idx]);
    hoverLine.attr("x1", xi).attr("x2", xi).style("display", null);

    let html = `<div class="income">£${DATA.incomes[idx].toFixed(0)}k income</div>`;
    series.forEach(s => {
      if (!visible.has(s.key)) { dots[s.key].style("display", "none"); return; }
      const val = DATA[s.key][idx];
      dots[s.key].attr("cx", xi).attr("cy", y(val)).style("display", null);
      html += `<div><span style="color:${s.color}">●</span> ${s.key}: <b>${val.toFixed(1)}%</b></div>`;
    });

    tooltip.html(html).style("display", null)
      .style("left", (event.pageX + 16) + "px")
      .style("top", (event.pageY - 10) + "px");
  })
  .on("mouseleave", () => {
    tooltip.style("display", "none");
    hoverLine.style("display", "none");
    Object.values(dots).forEach(d => d.style("display", "none"));
  });
</script>
</body>
</html>
